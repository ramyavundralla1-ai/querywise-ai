version: "3.9"

services:
  # ── Backend — FastAPI + DuckDB ──────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: querywise-backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DUCKDB_PATH=/app/data/querywise.duckdb
      - DEBUG=false
      - LOG_LEVEL=INFO
    volumes:
      - querywise-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - querywise-net

  # ── Frontend — Nginx (serves React SPA + proxies API)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: querywise-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - querywise-net

volumes:
  querywise-data:
    driver: local

networks:
  querywise-net:
    driver: bridge